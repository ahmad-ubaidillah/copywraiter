services:
  backend:
    build: ./backend
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
      - ./logs:/app/logs
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
